# Railway nixpacks override.
#
# v62 — failed deploys since 2026-05-25 11:00 PT were stuck on the
# auto-detected install phase: nixpacks runs a bare `npm i` BEFORE
# the buildCommand from railway.json, and that bare `npm i` was
# trying to fetch the workspace package `@travelsafe/crime-data`
# from the public npm registry (which doesn't exist there). The
# auto-detection picks up the root package.json but somehow loses
# the workspace context.
#
# This file pins both phases to commands that explicitly know about
# the npm workspace layout:
#   * install: `npm install --include=dev` (root install, workspaces
#     auto-link via npm's built-in workspace support since v7)
#   * build:   db generate + build the crime-data package + build:api
#     (mirrors what railway.json's buildCommand used to do, but moved
#     here so nixpacks runs them in its build phase and not as an
#     after-step that depends on a successful install phase first)

[phases.setup]
nixPkgs = ["nodejs_22", "npm-9_x", "openssl"]

[phases.install]
# v100 — `npm ci` (was `npm install`) for the Prisma 7 cutover: ci wipes
# node_modules and installs strictly from the lock, which (a) guarantees the v7
# prisma CLI replaces any stale v6 binary and (b) changes the command string so
# the cached install layer is busted and the phase actually re-runs.
cmds = ["npm ci --include=dev --include-workspace-root"]

# v100 (Prisma 7 cutover) — the build phase is a cached Docker layer keyed on
# the command STRING. The previous `npm run db:generate` indirection kept the
# string identical across the v7 bump, so Railway reused a stale v6 layer (it
# generated a 6.19.3 client to node_modules instead of the v7 client to
# src/generated, which then failed build:api's tsc and left the old container
# running). Invoking pinned prisma@7.8.0 DIRECTLY here (a) forces the v7 CLI
# regardless of any stale node_modules/.bin/prisma, and (b) changes the command
# string so the layer cache is busted and the phase actually re-runs.
[phases.build]
dependsOn = ["install"]
cmds = [
  "npx -y prisma@7.8.0 generate --schema=packages/db/prisma/schema.prisma",
  "npm run build --workspace packages/crime-data",
  "npm run build:api",
]

[start]
cmd = "npm run start:api"

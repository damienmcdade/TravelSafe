# v96 — quality gate. Runs on every PR and every push to main. The
# dependency-hygiene audit flagged that nothing automated was running
# typecheck/lint/test before deploys — the only PR-time check was the
# data-sync nightly. Now we gate merges.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual/programmatic trigger. The Boston snapshot refresh pushes with
  # GITHUB_TOKEN, whose pushes do NOT fire the `push` trigger above (GitHub
  # loop-prevention), so that commit never ran CI and never deployed to
  # Railway — the recurring nightly DEPLOY SKEW. workflow_dispatch is the
  # documented exception to that suppression, so refresh-boston-snapshot.yml
  # dispatches this workflow to run the full gate + Railway deploy.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build crime-data (prerequisite for api + web)
        run: npm run build --workspace packages/crime-data

      # fix(audit infra-ci-missing-typecheck-db-crimedata): typecheck the shared
      # packages too. crime-data's build emits via tsc, but a type-only check
      # catches errors the build's incremental cache can miss, and packages/db
      # (Prisma-generated types) had no CI typecheck at all.
      - name: Typecheck (crime-data)
        run: npm run typecheck --workspace packages/crime-data

      - name: Typecheck (db)
        run: npm run db:generate && npm run typecheck --workspace packages/db

      - name: Typecheck (api)
        run: npm run typecheck --workspace apps/api

      - name: Typecheck (web)
        run: npm run typecheck --workspace apps/web

      - name: Lint (api)
        run: npm run lint --workspace apps/api

      - name: Lint (web)
        run: npm run lint --workspace apps/web

      - name: Test (api)
        run: npm test --workspace apps/api

      - name: Build (api)
        run: npm run build --workspace apps/api

      - name: Build (web)
        run: npm run build --workspace apps/web

  # Keep Railway (apps/api) in lockstep with Vercel. ROOT CAUSE of the
  # frontend↔backend drift the sync-check chases: Vercel auto-deploys every push
  # to main, but Railway did NOT — so the API ran older adapter code than the web
  # until someone manually ran `railway up`, and tryProxy then served stale/
  # divergent responses. This job redeploys the API on every green push to main,
  # so both sides always run the same commit. Gated on `ci` so we never deploy a
  # red build.
  deploy-railway:
    name: Deploy API to Railway
    needs: ci
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Deploy (fail if token unset)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # fix(deploy skew 2026-06-10/11): a missing token used to warn + exit 0,
          # so this job stayed GREEN while Railway silently pinned at the last
          # manual deploy — the drift only surfaced a day later as the nightly
          # sync-check "DEPLOY SKEW" failure, attributed to the wrong place. A
          # deploy job that cannot deploy is a failure; fail it here, at the
          # commit that didn't ship, with the actual remediation.
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error title=Railway auto-deploy BLOCKED::RAILWAY_TOKEN is not set in repo secrets, so this commit is NOT deployed to Railway and the API will drift behind Vercel (the recurring nightly sync-check DEPLOY SKEW failure). Fix: add a Railway project token for communitysafe-api as RAILWAY_TOKEN (Settings → Secrets and variables → Actions). Stopgap: run 'bash tools/deploy-railway.sh' locally after merging."
            exit 1
          fi
          npm i -g @railway/cli@latest
          SVC=6a7c8ff7-b038-48d1-a623-d37ffe686011
          # fix(deploy sha-staleness): stamp the deployed commit FIRST so the new
          # container boots already reporting the right SHA. `railway up` is a CLI
          # file upload that carries NO git context, so GIT_COMMIT_SHA would
          # otherwise stay frozen at whatever it was last set to — /health then
          # reports a stale SHA and the sync-check deploy-coherence probe FAILS
          # even though the code is in lockstep. Setting the var redeploys the
          # current image with the new SHA; the `railway up` below supersedes it
          # with the new code, which inherits the freshly-set SHA.
          railway variables --service "$SVC" --set "GIT_COMMIT_SHA=${GITHUB_SHA:0:7}"
          # --service pins the API service; --detach returns once the build is
          # queued (the /health healthcheck gates the actual cutover).
          railway up --service "$SVC" --detach

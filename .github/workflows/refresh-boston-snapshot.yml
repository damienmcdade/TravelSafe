name: Refresh Boston Snapshot

# Boston ships as a committed bundled snapshot because data.boston.gov
# rejects Vercel's IP range for the live CSV download. This workflow
# regenerates the snapshot weekly so the data doesn't drift more than
# ~7 days behind BPD's publish cadence (which itself runs ~1 month
# behind real-time, so a 7-day refresh is plenty fresh).
#
# Runs every Monday 09:00 UTC (04:00 ET, before US business hours).

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write # to dispatch ci.yml after committing the snapshot
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run refresh-boston.mjs
        run: node tools/refresh-boston.mjs

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet packages/crime-data/src/data/boston-snapshot.ts packages/crime-data/src/data/boston-snapshot.json; then
            echo "No changes — BPD CSV unchanged since last refresh."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add packages/crime-data/src/data/boston-snapshot.ts packages/crime-data/src/data/boston-snapshot.json
          git commit -m "chore(boston): refresh bundled snapshot $(date -u +%Y-%m-%d)"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # The push above used GITHUB_TOKEN, so it will NOT trigger ci.yml's
      # `push` event (GitHub loop-prevention) — which is exactly why the API
      # kept drifting one snapshot behind Vercel (boston-snapshot.* lives in
      # the shared crime-data package, so the API serves stale Boston data
      # until Railway redeploys on the next normal push). Dispatch ci.yml
      # explicitly so the snapshot commit gets the full typecheck/lint/test
      # gate AND the Railway deploy. workflow_dispatch is the documented
      # exception to GITHUB_TOKEN trigger suppression, so this DOES create a run.
      - name: Trigger CI + Railway deploy for the snapshot commit
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run ci.yml --ref main
